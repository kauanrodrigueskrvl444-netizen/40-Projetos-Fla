<!DOCTYPE html>
<!-- Define que o documento é HTML5 -->

<html lang="pt-br">
<!-- Define o idioma como português do Brasil -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar acentos e caracteres especiais -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faz o site ficar responsivo em celular -->

    <title> Website layout | CodinLab</title>
    <!-- Título da aba do navegador -->

    <link rel="stylesheet" href="style.css">
    <!-- Conecta o arquivo CSS -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Importa os ícones do Font Awesome -->
</head>

<body>
    <!-- Corpo do site (tudo que aparece na tela) -->

    <nav>
        <!-- Barra de navegação -->

        <div class="menu">
            <!-- Container do menu -->

            <div class="logo">
                <!-- Logo do site -->
                <a href="#">CodingLab</a>
            </div>

            <ul>
                <!-- Lista de links do menu -->

                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Feedback</a></li>

            </ul>
        </div>
    </nav>

    <div class="img"></div>
    <!-- Div que recebe a imagem de fundo (via CSS) -->

    <div class="center">
        <!-- Conteúdo centralizado na tela -->

        <div class="title">Create Amazing Website</div>
        <!-- Título principal -->

        <div class="sub_title">Pure HTML & CSS Only </div>
        <!-- Subtítulo -->

        <div class="btns">
            <!-- Container dos botões -->

            <button>Learn More</button>
            <!-- Botão 1 -->

            <button>Subscribe</button>
            <!-- Botão 2 -->
        </div>

    </div>

</body>
</html>
